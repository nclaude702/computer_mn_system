<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register - Computer Lab Management</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">Lab Management</div>
    <button class="nav-toggle" aria-label="toggle navigation">
      <span class="hamburger"></span>
    </button>
    <ul class="nav-menu">
      <li><a href="home.html">Home</a></li>
      <li><a href="register.html" class="active">Register</a></li>
      <li><a href="view-users.html">View Users</a></li>
      <li><a href="view-computers.html">View Computers</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="container">

    <!-- User Registration Form -->
    <h2>Register User</h2>
    <form id="userRegisterForm">
      <label for="userName">Username</label>
      <input type="text" id="userName" name="username" placeholder="Enter user name" required />

      <label for="userPassword">Password</label>
      <input type="password" id="userPassword" name="password" placeholder="Enter password" required />

      <button type="submit">Register User</button>
    </form>

    <hr style="margin: 40px 0;" />

    <!-- Computer Registration Form -->
    <h2>Register Computer</h2>
    <form id="computerRegisterForm">
      <label for="computerCode">Computer Code</label>
      <input type="text" id="computerCode" name="computer_code" placeholder="Enter computer code" required />

      <label for="computerDescription">Description</label>
      <input type="text" id="computerDescription" name="description" placeholder="Enter description" required />

      <label for="computerSerial">Serial Number</label>
      <input type="text" id="computerSerial" name="serial_number" placeholder="Enter serial number" required />

      <button type="submit">Register Computer</button>
    </form>

  </main>

  <!-- JS -->
  <script src="js/script.js"></script>
</body>
</html>
