<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>View Computers - Computer Lab Management</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">Lab Management</div>
    <button class="nav-toggle" aria-label="toggle navigation">
      <span class="hamburger"></span>
    </button>
    <ul class="nav-menu">
      <li><a href="home.html">Home</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="view-users.html">View Users</a></li>
      <li><a href="view-computers.html" class="active">View Computers</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <h2>Computers List</h2>
    <table>
      <thead>
        <tr>
          <th>Computer Code</th>
          <th>Description</th>
          <th>Serial Number</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="computerTableBody">
        <!-- Data will be populated via JavaScript -->
      </tbody>
    </table>
  </main>

  <!-- Script to load computers -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const tableBody = document.getElementById("computerTableBody");

      fetch("/api/computers")
        .then(res => res.json())
        .then(computers => {
          computers.forEach(computer => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${computer.computer_code}  </td>
              <td>${computer.description}  </td>
              <td>${computer.serial_number} </td>
              <td>
                 <a href="update_computers.html?id=${computer.id}">
                 <button class="btn update" data-id="${computer.id}">Update</button> </a>
                 <button class="btn delete" data-id="${computer.id}">Delete</button>
              </td>
            `;
            tableBody.appendChild(tr);
          });

          // Handle Delete
          document.querySelectorAll(".btn.delete").forEach(button => {
          button.addEventListener("click", function () {
              const id = this.dataset.id;
              if (confirm("Are you sure you want to delete this computer?")) {
                fetch(`/api/computers/${id}`, {
                  method: "DELETE"
                })
                .then(res => res.json())
                .then(data => {
                  alert(data.message);
                  location.reload();
                });
              }
            });
          });

          // Handle Update
          document.querySelectorAll(".btn.update").forEach(button => {
            button.addEventListener("click", function () {
              const id = this.dataset.id;
              const row = this.closest("tr");

              const computer_code = row.querySelector(".edit-code").value;
              const description = row.querySelector(".edit-description").value;
              const serial_number = row.querySelector(".edit-serial").value;

              fetch(`/api/computers/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ computer_code, description, serial_number })
              })
              .then(res => res.json())
              .then(data => {
                alert(data.message);
                location.reload();
              });
            });
          });
        })
        .catch(err => {
          console.error(" Error loading computers:", err);
        });
    });
  </script>

  <script src="js/script.js"></script>
</body>
</html>
